app = 'whatsapp-nagger'
primary_region = 'fra'

[build]

[mounts]
  source = 'nagger_data'
  destination = '/data'

[env]
  MESSENGER = 'whatsapp'
  WHATSAPP_DB_PATH = '/data/whatsapp_session.db'
  TASKS_DB_PATH = '/data/tasks.db'
  PERSONAS_FILE = '/data/personas.md'
  NEXT_PUBLIC_BILLING_DAY = '10'

[http_service]
  internal_port = 3000
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
